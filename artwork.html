<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<title>Website Template</title>
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="./assets/css/styles.css">
	<style>
		:root {
			--card_width: 250px;
			--card_border_radius: 16px;
			--row_increment: 10px;
			--card_small: 26;
			--card_medium: 33;
			--card_large: 45;
		}

		body {
			margin: 0;
			padding: 0;
			background color: grey;
		}

		.pin_container {
			margin: 0;
			padding: 0;
			width: 80vw;
			position: absolute;
			left: 50%;
			transform: translateX(-50%);

			display: grid;
			grid-template-columns: repeat(auto-fill, var(--card_grid-auto-rows: var(--row_increment);
			grid-auto-rows: var(--row_increment);
			justify-content: center;

			background-color: black;
		}

		.card {
			padding: 0px;
			margin: 15px 10px;
			border-radius: var(--card_border_radius);

			background-color: red;
		}

		.card_small {
			grid-row-end: span var(--card_small);
		}
		.card_medium {
			grid-row-end: span var(--card_medium);
		}
		.card_large {
			grid-row-end: span var(--card_large);
		}
	</style>
	

	
</head>
<body>

	<h1>Website Template</h1>

	<div class="pin_container">
		<div class="card card_small"></div>
		<div class="card card_medium"></div>
		<div class="card card_large"></div>
		<div class="card card_small"></div>
		<div class="card card_medium"></div>
		<div class="card card_large"></div>
		<div class="card card_small"></div>
		<div class="card card_medium"></div>
		<div class="card card_large"></div>
	</div>
	
	<div class="row">
			<div id="mysidenav" class="col-4">
				<p>col-4</p>
				<a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
				<a href="index.html">Home</a>
				<a href="#about">About</a>
				<a href="artwork.html">Artwork</a>
				<a href="#contact">Contact</a>
			</div>
	</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script><br>
<script src="./assets/js/main.js"></script>
</body>
</html>
