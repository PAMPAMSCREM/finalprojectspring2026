<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART ART ART ART ART</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .options {
            display: flex;
            gap: 10px;
            width: 90%;
            height: 300px;
        }

        .option {
            flex: 1;
            background-image: var(--optionImage);
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            transition: flex 0.6s ease;
            overflow: hidden;
        }

        .option.active {
            flex: 4;
        }

        .option:not(.active) {
            filter: brightness(0.6);
        }

        .label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            opacity: 0;
            transition: 0.4s ease;
        }

        .option.active .label {
            opacity: 1;
        }

        .icon {
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 40px;
            min-height: 40px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.2);
            color: white;
        }

        .info {
            display: flex;
            flex-direction: column;
        }

        .info .main {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .info .sub {
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
	
	<h1>HOME PAGE HOME PAGE HOME PAGE</h1>
<nav>
	<div class="container">
		<div class="row text-center headline">
			<div class="topnav">

				<a href="artwork.html">Artwork</a>
				<a href="contact.html">Contact</a>
			</div>
		</div>
	</div>
</nav>


    <div class="options">
        <div class="option active" style="--optionImage: url('https://i.pinimg.com/736x/0f/f6/9e/0ff69e211dcf9b74f4f60ffd58fb8c30.jpg');">
            <div class="label">
                <div class="icon"><i class="fas fa-walking"></i></div>
                <div class="info">
                    <div class="main">Portrait of a woman on fire</div>
                    <div class="sub">Tragic love story</div>
                </div>
            </div>

        <div class="option" style="--optionImage: url('https://i.pinimg.com/736x/96/96/52/969652d3bb70cd35233fa9762f8e0965.jpg');">
            <div class="label">
                <div class="icon"><i class="fas fa-tree"></i></div>

                    <div class="main">Grace</div>

        <div class="option"
             style="--optionImage: url('https://i.pinimg.com/1200x/35/b3/77/35b377706cb54ecb4de821a8e1b121cb.jpg');">
            <div class="label">
                <div class="icon"><i class="fas fa-mountain"></i></div>
                <div class="info">
                    <div class="main">Curiosity</div>
                    <div class="sub">Space cowboys</div>
                </div>
            </div>

        <div class="option" style="--optionImage: url('https://i.pinimg.com/1200x/81/7f/3e/817f3e9f5f80dc743c327390bb434f48.jpg');">
            <div class="label">
                <div class="icon"><i class="fas fa-water"></i></div>

                </div>
            </div>
        </div>

    </div>

    <script>
        const options = document.querySelectorAll(".option");
        let currentIndex = 0;

        // Manual click activation
        options.forEach((option, index) => {
            option.addEventListener("click", () => {
                setActive(index);
            });
        });

        // Function to activate selected slide
        function setActive(index) {
            options.forEach(o => o.classList.remove("active"));
            options[index].classList.add("active");
            currentIndex = index;
        }

        // Auto slide every 3 seconds
        setInterval(() => {
            currentIndex = (currentIndex + 1) % options.length;
            setActive(currentIndex);
        }, 3000);
    </script>
