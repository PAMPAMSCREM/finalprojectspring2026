<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Outfit';
        background: linear-gradient(#8693ab, #637074); /* LAVENDER GREY AND DIM GREY */
      }

      .contact-container {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
      }

      .contact-left {
        display: flex;
        flex-direction: column;
        align-items: start;
        gap: 20px;
      }

      .contact-left-title h2 {
        font-weight: 600;
        color: #aab9cf; /*POWDER BLUE*/
        font-size: 40px;
        margin-bottom: 5px;
      }

      .contact-left-title hr {
        border: none;
        width: 120px;
        height: 5px;
        background-color: ;
      }

      .contact-inputs {
        width: 400px;
        height: 50px;
        border: none;
        outline: none;
        padding-left: 25px;
        font-weight: 500;
        color: #666;
        border-radius: 50px;
      }

      .contact-left textarea {
        height: 140px;
        padding-top: 15px;
        border-radius: 20px;
      }

      .contact-inputs:focus{
        border: 2px solid #aab9cf; /* POWDER BLUE */
      }

      .contact-inputs::placeholder {
        color: #a9a9a9;
      }

      .contact-left buttom{
        display: flex;
        align-items: center;
        padding: 15px 30px;
        font-size: 16px;
        color: #fff;
        gap: 10px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(270deg, #bdd4e7, #aab9cf); /* PALE SKY AND POWDER BLUE */
        cursor: pointer;
      }

      .contact-left buttom img {
        height: 15px;
      }

      .contact-right img {
        width: 500px;
      }

      @media (max-width:800px) {
        .contact-inputs {
          width: 80vw;
        }
        .contact-right {
          display: none;
        }
      }
      .topnav {
			position: fixed;
			top: 0;
			width: 100%;
			z-index: 1000;
			background-color: rgb(33, 34, 39);
			overflow: hidden;
		}

		.topnav a {
			float: left;
			color: #f2f2f2;
			text-align: center;
			padding: 14px 16px;
			text-decoration: none;
			font-size: 17px;
			font-family: "Google Sans Flex", sans seif;
		}

		.topnav a:hover {
			background-color: rgb(189, 212, 231);
			color: rgb(33, 34, 39); /*SHADOW GREY*/
			border-radius: 20px /*MAKES ROUNDED EDGES*/
		}

		.topnav a.active {
			background-color: #04AA6D;
			color: white;
    </style>
  </head>

<body>

  <div class="topnav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="artwork.html">Artwork</a>
    <a href="contact.html">Contact</a>
  </div>
  
  <div class="contact-container">
    <form action="http://api.web3forms.com/submit"  method="POST" class="contact-left">
      <div class="contact-left-title">
        <h2>Get in touch</h2>
        <hr>
      </div>
      <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
      <input type="text" name="name" placeholder="Your Name" class="contact-inputs" required>
      <input type="email" name="email" placeholder="Your Email" class="contact-inputs" required>
      <textarea name="message" placeholder="Your Message" class="contact-inputs" required></textarea>
      <button type="submit">Submit</button>
    </form>
    <div class="contact-right">
      <img src="https://i.pinimg.com/736x/2e/48/47/2e48478b801719e0b45885255aa878be.jpg" alt="">
  </div>
</body>
</html>
